# nginx config for Hotel PMS + POS on GCP VM
# Place at: /etc/nginx/sites-available/tri

# Hotel PMS Frontend — port 3001
server {
    listen 3001;
    server_name _;
    root /home/smitanihalani0/tri/poss/frontend/build;
    index index.html;

    # React router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# POS Frontend — port 3000
server {
    listen 3000;
    server_name _;
    root /home/smitanihalani0/tri/pos/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Hotel PMS Backend API — port 8000
# (uvicorn runs directly on 8000, nginx not needed unless you want SSL)

